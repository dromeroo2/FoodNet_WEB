<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="HOMEPAGE" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP</title>

    <!-- Cargo la hoja de estilos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Cargo la hoja de estilos del modo oscuro -->
    <link rel="stylesheet" href="css/dark-styles.css">

    <!-- SCRIPT MODO OSCURO -->
    <script src="js/dark-mode.js" defer></script>

    <!-- Cargo el script para comprobar las contraseñas -->
    <script src="js/signup-check.js"></script>

    
</head>
    <body>
        <header>
            <h1>Crear una cuenta en FoodNet</h1>
            <p>Únete y comparte tus mejores recetas</p>
        </header>
        <div class="container">
            <h2>Registro de nuevo usuario</h2>
            <form action="registro" method="POST">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Repite la contraseña:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    
                    <div id="password-message" style="display:none; margin-top: 5px;"></div>

                </div>

                <button type="button" id="btn-register" class="cta-btn" style="width:100%;">Crear Cuenta</button>            
            </form>

            <p style="margin-top:20px; text-align:center;">
                ¿Ya tienes una cuenta? <a href="index.html" style="color:#0078d7;">Inicia sesión</a>
            </p>
        </div>

        <footer>&copy; 2025 David Romero Oñoro. Arquitectura de Sistemas Web y C/S.</footer>

    </body>
</html>
